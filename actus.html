<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Actualités — Moulin des Moines</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,200;0,400;1,200&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root{--bg:#faf8f5;--bg-card:#ffffff;--bg-beige:#f0ebe3;--bg-beige-dark:#e8dfd4;--text:#5c4a38;--text-secondary:#a89080;--text-muted:#c0b0a0;--accent:#4a7c59;--accent-light:#eef4f0;--accent-hover:#3d6b4a;--terra:#a0522d;--brown:#78503c;--gold:#c8a87a;--border:#e8e0d6;--border-light:#f0ebe8;--danger:#c0392b;--danger-light:#fdecea;--shadow:rgba(92,74,56,0.08);}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;font-weight:300;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
/* Header */
.ap-header{background:var(--bg-card);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.ap-logo{font-family:'Fraunces',serif;font-weight:200;font-size:18px;color:var(--brown)}
.ap-logo em{font-style:italic;color:var(--terra)}
.ap-back{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text-secondary);font-size:12px;cursor:pointer;text-decoration:none;transition:all .15s;font-family:'Inter',sans-serif}
.ap-back:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
/* Body */
.ap-body{flex:1;max-width:760px;width:100%;margin:0 auto;padding:28px 20px 60px}
.ap-title{font-family:'Fraunces',serif;font-weight:200;font-size:26px;color:var(--brown);margin-bottom:4px}
.ap-sub{font-size:12px;font-weight:300;color:var(--text-muted);margin-bottom:24px}
/* Filtres */
.ap-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.ap-filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);font-size:11px;font-weight:400;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.ap-filter-btn:hover,.ap-filter-btn.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.ap-filter-btn.active-promo{border-color:#f59e0b;background:#fffbeb;color:#92400e}
.ap-filter-btn.active-alerte{border-color:var(--danger);background:var(--danger-light);color:var(--danger)}
/* Stats */
.ap-stats{display:flex;gap:10px;margin-bottom:20px}
.ap-stat{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:10px 16px;text-align:center;flex:1}
.ap-stat-val{font-family:'Fraunces',serif;font-weight:200;font-size:20px;color:var(--brown)}
.ap-stat-lbl{font-size:10px;font-weight:400;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
/* Cards */
.ap-list{display:flex;flex-direction:column;gap:12px}
.ap-card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:box-shadow .15s}
.ap-card:hover{box-shadow:0 4px 16px var(--shadow)}
.ap-card-stripe{height:4px}
.ap-card-stripe.promo{background:linear-gradient(90deg,#f59e0b,#fcd34d)}
.ap-card-stripe.alerte{background:linear-gradient(90deg,var(--danger),#f87171)}
.ap-card-stripe.info{background:linear-gradient(90deg,var(--accent),#6ee7b7)}
.ap-card-body{padding:16px 18px}
.ap-card-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.ap-card-badge{font-size:10px;font-weight:700;text-transform:uppercase;padding:3px 9px;border-radius:4px;letter-spacing:.4px;flex-shrink:0}
.ap-card-badge.promo{background:#f59e0b;color:#fff}
.ap-card-badge.alerte{background:var(--danger);color:#fff}
.ap-card-badge.info{background:var(--accent);color:#fff}
.ap-card-title{font-size:14px;font-weight:500;color:var(--text);flex:1;line-height:1.4}
.ap-card-date{font-size:11px;font-weight:300;color:var(--text-muted);white-space:nowrap}
.ap-card-content{font-size:13px;font-weight:300;color:var(--text-secondary);line-height:1.8}
/* Empty / loading */
.ap-empty{padding:48px;text-align:center;color:var(--text-muted)}
.ap-empty-icon{font-size:36px;margin-bottom:12px}
.ap-empty-text{font-size:13px;font-weight:300}
.ap-loading{padding:40px;text-align:center;color:var(--text-muted);font-size:13px}
/* Badge nouveau */
.ap-card-new{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:var(--accent-light);color:var(--accent);border-radius:10px;font-size:10px;font-weight:600}
</style>
</head>
<body>
<header class="ap-header">
  <div class="ap-logo">Moulin <em>des</em> Moines</div>
  <a id="back-btn" href="dashboard.html" class="ap-back">&#8592; Tableau de bord</a>
</header>
<div class="ap-body">
  <div class="ap-title">&#128241; Actualités</div>
  <div class="ap-sub">Les dernières informations de Moulin des Moines</div>
  <!-- Stats -->
  <div class="ap-stats" id="ap-stats" style="display:none">
    <div class="ap-stat"><div class="ap-stat-val" id="stat-total">0</div><div class="ap-stat-lbl">Actualités</div></div>
    <div class="ap-stat"><div class="ap-stat-val" id="stat-promo" style="color:#f59e0b">0</div><div class="ap-stat-lbl">Promotions</div></div>
    <div class="ap-stat"><div class="ap-stat-val" id="stat-alerte" style="color:var(--danger)">0</div><div class="ap-stat-lbl">Alertes</div></div>
    <div class="ap-stat"><div class="ap-stat-val" id="stat-info" style="color:var(--accent)">0</div><div class="ap-stat-lbl">Infos</div></div>
  </div>
  <!-- Filtres -->
  <div class="ap-filters" id="ap-filters" style="display:none">
    <button class="ap-filter-btn active" onclick="filterActus('all',this)">Toutes</button>
    <button class="ap-filter-btn" onclick="filterActus('promo',this)">&#127991; Promotions</button>
    <button class="ap-filter-btn" onclick="filterActus('alerte',this)">&#9888; Alertes</button>
    <button class="ap-filter-btn" onclick="filterActus('info',this)">&#8505; Infos</button>
  </div>
  <!-- Liste -->
  <div class="ap-list" id="ap-list">
    <div class="ap-loading">&#9679;&#160;&#9679;&#160;&#9679; Chargement des actualités…</div>
  </div>
</div>
<script>

var _fbReady2=false,_db2=null;
var FIREBASE_CONFIG = {
  apiKey:            "AIzaSyB000QDa4c-vMjO1Xuimw58iiRvwgbF1zc",
  authDomain:        "mdm-bdc26.firebaseapp.com",
  projectId:         "mdm-bdc26",
  storageBucket:     "mdm-bdc26.firebasestorage.app",
  messagingSenderId: "52658530893",
  appId:             "1:52658530893:web:166626ae4d681465ddca04"
};

function _initFB(){
  if(_fbReady2) return Promise.resolve(_db2);
  return new Promise(function(resolve,reject){
    if(typeof firebase==='undefined'){reject(new Error('SDK non chargé'));return;}
    if(!firebase.apps||!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    _db2=firebase.firestore();
    _fbReady2=true;
    resolve(_db2);
  });
}

function _safeB64Decode(s){try{return atob(s.replace(/-/g,'+').replace(/_/g,'/'));}catch(e){return '{}';}}
function _getLogin(){
  try{var t=sessionStorage.getItem('mdm_token');if(!t)return null;return JSON.parse(_safeB64Decode(t)).login||null;}
  catch(e){return null;}
}

function showToast(msg){
  var t=document.getElementById('_toast');
  if(!t){t=document.createElement('div');t.id='_toast';
    t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#5c4a38;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;font-family:Inter,sans-serif;pointer-events:none';
    document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._t);t._t=setTimeout(function(){t.style.opacity='0';},3000);
}

function _esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

var _allActus=[];
var _currentFilter='all';

function loadActus(){
  _initFB().then(function(db){
    // Essayer avec les deux champs possibles (actif ou active)
    db.collection('actus').get().then(function(snap){
      var all=snap.docs.map(function(doc){return Object.assign({_id:doc.id},doc.data());});
      // Filtrer les actus actives (champ actif ou active)
      _allActus=all.filter(function(a){
        return a.actif!==false && a.active!==false;
      });
      // Trier par date desc
      _allActus.sort(function(a,b){
        var da=a.date?new Date(a.date):new Date(0);
        var db_=b.date?new Date(b.date):new Date(0);
        return db_-da;
      });
      renderStats();
      renderActus();
    }).catch(function(e){
      document.getElementById('ap-list').innerHTML=
        '<div class="ap-empty"><div class="ap-empty-icon">&#9888;</div><div class="ap-empty-text">Impossible de charger les actualités.<br><small>'+e.message+'</small></div></div>';
    });
  });
}

function renderStats(){
  var total=_allActus.length;
  if(!total){
    document.getElementById('ap-stats').style.display='none';
    document.getElementById('ap-filters').style.display='none';
    return;
  }
  document.getElementById('ap-stats').style.display='flex';
  document.getElementById('ap-filters').style.display='flex';
  document.getElementById('stat-total').textContent=total;
  document.getElementById('stat-promo').textContent=_allActus.filter(function(a){return (a.type||'').toLowerCase()==='promo';}).length;
  document.getElementById('stat-alerte').textContent=_allActus.filter(function(a){return (a.type||'').toLowerCase()==='alerte';}).length;
  document.getElementById('stat-info').textContent=_allActus.filter(function(a){return (a.type||'info').toLowerCase()==='info';}).length;
}

function filterActus(type,btn){
  _currentFilter=type;
  document.querySelectorAll('.ap-filter-btn').forEach(function(b){
    b.className='ap-filter-btn';
  });
  if(btn){
    btn.className='ap-filter-btn active'+(type!=='all'?' active-'+type:'');
  }
  renderActus();
}

function renderActus(){
  var list=document.getElementById('ap-list');
  if(!list) return;
  var filtered=_currentFilter==='all'?_allActus:_allActus.filter(function(a){
    return (a.type||'info').toLowerCase()===_currentFilter;
  });
  if(!filtered.length){
    list.innerHTML='<div class="ap-empty"><div class="ap-empty-icon">&#128241;</div><div class="ap-empty-text">Aucune actualité'
      +(_currentFilter!=='all'?' dans cette catégorie':'')+'.</div></div>';
    return;
  }
  var now=Date.now();
  list.innerHTML=filtered.map(function(a){
    var type=(a.type||'info').toLowerCase();
    var label=type==='promo'?'Promotion':type==='alerte'?'Alerte':'Info';
    var date='';
    var isNew=false;
    if(a.date){
      try{
        var dd=new Date(a.date);
        date=dd.toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});
        isNew=(now-dd.getTime())<7*24*3600*1000; // moins de 7 jours
      }catch(e){}
    }
    return '<div class="ap-card">'      +'<div class="ap-card-stripe '+type+'"></div>'      +'<div class="ap-card-body">'      +'<div class="ap-card-top">'      +'<span class="ap-card-badge '+type+'">'+label+'</span>'      +(isNew?'<span class="ap-card-new">&#10024; Nouveau</span>':'')      +'<span class="ap-card-title">'+_esc(a.titre||a.title||'')+'</span>'      +(date?'<span class="ap-card-date">'+date+'</span>':'')      +'</div>'      +'<div class="ap-card-content">'+_esc(a.contenu||a.content||'')+'</div>'      +'</div>'      +'</div>';
  }).join('');
}

window.addEventListener('DOMContentLoaded',function(){
  if(!_getLogin()){window.location.href='index.html';return;}
  loadActus();
});

</script>
</body>
</html>
