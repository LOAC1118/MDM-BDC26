<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Moulin des Moines</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,200;0,400;1,200&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f5f2ee;--card:#fff;--text:#2d2018;--text2:#7a6655;--text3:#b09a8a;
    --accent:#4a7c59;--accent-l:#edf5ef;--terra:#a0522d;--terra-l:#fdf0e8;
    --brown:#6b4c3b;--border:#e5dcd5;--border-l:#ede8e2;
    --danger:#c0392b;--danger-l:#fdecea;--warn:#b45309;--warn-l:#fef3c7;
    --green:#2e7d47;--green-l:#e8f5ed;
    --shadow:0 1px 3px rgba(45,32,24,.08);--shadow-md:0 4px 16px rgba(45,32,24,.12);
    --r:8px;--sidebar:220px;--topbar:54px;
  }
  body{
    font-family:'Inter',sans-serif;font-size:13px;font-weight:300;
    color:var(--text);background:var(--bg);
    height:100vh;display:flex;flex-direction:column;overflow:hidden;
  }
  .topbar{
    height:var(--topbar);background:var(--card);border-bottom:1px solid var(--border);
    display:flex;align-items:center;padding:0 18px;gap:14px;z-index:200;box-shadow:var(--shadow);
  }
  .zone{flex:1;display:flex;overflow:hidden}
  .sidebar{
    width:var(--sidebar);background:var(--card);border-right:1px solid var(--border);
    overflow-y:auto;display:flex;flex-direction:column;padding:8px 0 16px;
  }
  .main{flex:1;overflow-y:auto;padding:22px 26px}
  .logo{font-family:'Fraunces',serif;font-size:16px;color:var(--brown)}
  .logo em{font-style:italic;color:var(--terra)}
  .nav-item{padding:10px 14px;cursor:pointer;color:var(--text2);display:flex;align-items:center;gap:10px}
  .nav-item.active{background:var(--accent-l);color:var(--accent);font-weight:600}
  .page{display:none}
  .page.active{display:block}
  /* Correction affichage stats */
  .stats-row{display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:15px;margin-bottom:20px}
  .stat-card{background:var(--card);padding:15px;border-radius:var(--r);border:1px solid var(--border)}
  #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:5px;display:none;z-index:10000}
</style>
</head>
<body>

<header class="topbar">
  <div class="logo">Moulin <em>des</em> Moines <sup>Admin</sup></div>
  <div style="flex:1"></div>
  <div class="user-info">
    <span id="admin-name">Administrateur</span>
    <button onclick="alert('Déconnexion...')">Déconnexion</button>
  </div>
</header>

<div class="zone">
  <nav class="sidebar">
    <div class="nav-item active" onclick="showPage('dashboard',this)">Tableau de bord</div>
    <div class="nav-item" onclick="showPage('comptes',this)">Comptes</div>
    <div class="nav-item" onclick="showPage('inscriptions',this)">Inscriptions</div>
  </nav>

  <main class="main">
    <div class="page active" id="page-dashboard">
      <h2>Tableau de bord</h2>
      <div class="stats-row">
        <div class="stat-card">Clients: <span id="stat-clients">0</span></div>
        <div class="stat-card">Commandes: <span id="stat-nb-commandes">0</span></div>
      </div>
    </div>

    <div class="page" id="page-comptes">
      <h2>Gestion des Comptes</h2>
      <table class="tbl" style="width:100%; margin-top:15px;">
        <thead>
          <tr><th>Nom</th><th>Rôle</th><th>Email</th></tr>
        </thead>
        <tbody id="comptes-tbody">
          <tr><td colspan="3">Aucun compte chargé</td></tr>
        </tbody>
      </table>
    </div>

    <div class="page" id="page-inscriptions">
      <h2>Demandes d'inscription</h2>
      <div id="inscriptions-list">En attente de données...</div>
    </div>
  </main>
</div>

<div id="toast">Message</div>

<script>
  // Fonction de navigation corrigée
  function showPage(pageId, element) {
    // Masquer toutes les pages
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    // Afficher la page sélectionnée
    const target = document.getElementById('page-' + pageId);
    if(target) target.classList.add('active');

    // Gérer l'état actif dans le menu
    document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
    if(element) element.classList.add('active');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none' }, 3000);
  }

  // Initialisation par défaut
  window.onload = function() {
    console.log("Interface Admin Chargée");
  };
</script>

</body>
</html>
