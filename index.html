<title>Connexion &mdash; Moulin des Moines</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--terra:#C87864;--brown:#78503C;--cream:#FDF5EE;--gold:#D2B469;--green:#1A5C2E;--white:#fff;--shadow:rgba(120,80,60,0.18)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Outfit",sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--cream);background-image:radial-gradient(ellipse at 20% 50%,rgba(200,120,100,.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(210,180,105,.10) 0%,transparent 50%)}

.login-wrap{width:100%;max-width:420px;padding:20px}

/* Logo */
.logo-block{text-align:center;margin-bottom:32px}
.logo-icon{width:72px;height:72px;background:var(--brown);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:30px;margin-bottom:14px;box-shadow:0 4px 20px var(--shadow)}
.logo-title{font-family:"Cormorant Garamond",serif;font-size:30px;font-weight:700;color:var(--brown);letter-spacing:.5px}
.logo-title span{color:var(--terra)}
.logo-sub{font-size:12px;color:#a08070;margin-top:4px;letter-spacing:.3px}

/* Card */
.card{background:var(--white);border-radius:16px;padding:36px 32px;box-shadow:0 8px 40px var(--shadow);position:relative;overflow:hidden}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--terra),var(--gold),var(--brown))}
.card-title{font-size:14px;font-weight:600;color:var(--brown);margin-bottom:24px;text-align:center;opacity:.8}

/* Form */
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--brown);text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px}
.input-wrap{position:relative}
.input-wrap .icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;opacity:.5;pointer-events:none}
.form-group input{width:100%;padding:12px 14px 12px 40px;border:1.5px solid #e0d0c4;border-radius:8px;font-family:"Outfit",sans-serif;font-size:14px;background:var(--cream);color:#3a2a20;outline:none;transition:all .18s}
.form-group input:focus{border-color:var(--terra);background:#fff;box-shadow:0 0 0 3px rgba(200,120,100,.12)}
.form-group input::placeholder{color:#c0a898;font-size:13px}

/* Toggle password */
.toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;opacity:.4;padding:4px;transition:opacity .15s}
.toggle-pw:hover{opacity:.8}

/* Bouton */
.btn-login{width:100%;padding:13px;background:var(--brown);color:var(--white);border:none;border-radius:8px;font-family:"Outfit",sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:.3px;margin-top:8px}
.btn-login:hover{background:var(--terra);box-shadow:0 4px 16px rgba(200,120,100,.35)}
.btn-login:active{transform:scale(.98)}
.btn-login:disabled{opacity:.6;cursor:not-allowed}

/* Spinner */
.spinner{width:16px;height:16px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* Erreur */
.error-msg{background:#fdecea;color:#c62828;border:1px solid #ef9a9a;border-radius:8px;padding:11px 14px;font-size:13px;margin-top:16px;display:none;text-align:center;animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* Footer */
.footer{text-align:center;margin-top:24px;font-size:11px;color:#b0988a}

/* Comptes info (admin) */
.accounts-hint{background:#f5ede5;border-radius:8px;padding:12px 14px;margin-top:20px;font-size:11px;color:#a07060;border:1px solid #e8d8cc}
.accounts-hint strong{color:var(--brown);display:block;margin-bottom:6px}
.accounts-hint ul{padding-left:16px;line-height:1.8}
</style>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<body>

<div class="login-wrap">

  <!-- Logo -->
  <div class="logo-block">
    <div class="logo-icon">&#127806;</div>
    <div class="logo-title">Moulin <span>des</span> Moines</div>
    <div class="logo-sub">Espace Commandes 2026</div>
  </div>

  <!-- Card connexion -->
  <div class="card">
    <div class="card-title">Veuillez vous identifier pour acc&#233;der au bon de commande</div>

    <div class="form-group">
      <label>Identifiant</label>
      <div class="input-wrap">
        <span class="icon">&#128100;</span>
        <input type="text" id="login" placeholder="Votre identifiant" autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
    </div>

    <div class="form-group">
      <label>Mot de passe</label>
      <div class="input-wrap">
        <span class="icon">&#128274;</span>
        <input type="password" id="password" placeholder="Votre mot de passe" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="toggle-pw" onclick="togglePw()" tabindex="-1" title="Afficher / masquer">&#128065;</button>
      </div>
    </div>

    <button class="btn-login" id="btn-login" onclick="doLogin()">
      <span class="spinner" id="spinner"></span>
      <span id="btn-label">Se connecter</span>
      <span>&#8594;</span>
    </button>

    <div class="error-msg" id="error-msg">Identifiant ou mot de passe incorrect.</div>
  </div>

  <div class="footer">Moulin des Moines &copy; 2026 &nbsp;&middot;&nbsp; Acc&#232;s r&#233;serv&#233; aux utilisateurs autoris&#233;s</div>
  <div style="text-align:center;margin-top:14px;font-size:12px;color:#a08070">
    Nouveau magasin ? <a href="inscription-client.html" style="color:var(--terra);text-decoration:none;font-weight:600">Faire une demande d&#8217;acc&#232;s &#8594;</a>

</div>

// ── Charger les comptes depuis Firebase (puis fallback localStorage)
// ============================================================
// MDM — Couche Firebase Firestore
// Remplace localStorage pour : comptes, historique, actus, inscriptions
// ============================================================

var FIREBASE_CONFIG = {
  apiKey:            "AIzaSyB000QDa4c-vMjO1Xuimw58iiRvwgbF1zc",
  authDomain:        "mdm-bdc26.firebaseapp.com",

  appId:             "1:52658530893:web:166626ae4d681465ddca04"
};

var _db = null;
var _fbReady = false;

function initFirebase() {
  if (_fbReady) return Promise.resolve(_db);
  return new Promise(function(resolve, reject) {
    if (typeof firebase === 'undefined') {
      reject(new Error('Firebase SDK non chargé'));
      return;
    }
    if (!firebase.apps || !firebase.apps.length) {
      firebase.initializeApp(FIREBASE_CONFIG);
    }
    _db = firebase.firestore();
    _fbReady = true;
    resolve(_db);
  });
}

// ── Comptes ──────────────────────────────────────────────────

function fbLoadComptes() {
  return initFirebase().then(function(db) {
    return db.collection('comptes').get().then(function(snap) {
      return snap.docs.map(function(d) { return Object.assign({_id: d.id}, d.data()); });
    });
  });
}

function fbSaveComptes(comptes) {
  return initFirebase().then(function(db) {
    var batch = db.batch();
    // Supprimer tous puis réécrire (simple pour un petit volume)
    return db.collection('comptes').get().then(function(snap) {
      snap.docs.forEach(function(d) { batch.delete(d.ref); });
      comptes.forEach(function(c) {
        var ref = db.collection('comptes').doc(c.login);
        batch.set(ref, c);
      });
      return batch.commit();
    });
  });
}

function fbSaveCompte(compte) {
  return initFirebase().then(function(db) {
    return db.collection('comptes').doc(compte.login).set(compte);
  });
}

function fbDeleteCompte(login) {
  return initFirebase().then(function(db) {
    return db.collection('comptes').doc(login).delete();
  });
}

// ── Historique commandes ─────────────────────────────────────

function fbSaveOrder(login, order) {
  return initFirebase().then(function(db) {
    return db.collection('historique')
      .doc(login)
      .collection('commandes')
      .doc(String(order.id || Date.now()))
      .set(order);
  });
}

function fbLoadHistory(login) {
  return initFirebase().then(function(db) {
    return db.collection('historique')
      .doc(login)
      .collection('commandes')
      .orderBy('id', 'desc')
      .limit(50)
      .get()
      .then(function(snap) {
        return snap.docs.map(function(d) { return d.data(); });
      });
  });
}

function fbLoadAllHistory() {
  return initFirebase().then(function(db) {
    return db.collection('historique').get().then(function(snap) {
      var promises = snap.docs.map(function(loginDoc) {
        return loginDoc.ref.collection('commandes')
          .orderBy('id', 'desc').limit(50).get()
          .then(function(cmdSnap) {
            return cmdSnap.docs.map(function(d) {
              return Object.assign({_login: loginDoc.id}, d.data());
            });
          });
      });
      return Promise.all(promises).then(function(arrays) {
        return [].concat.apply([], arrays).sort(function(a,b) {
          return (b.id||0) - (a.id||0);
        });
      });
    });
  });
}

// ── Actualités ───────────────────────────────────────────────

function fbLoadActus() {
  return initFirebase().then(function(db) {
    return db.collection('actus').orderBy('id', 'desc').get().then(function(snap) {
      return snap.docs.map(function(d) { return d.data(); });
    });
  });
}

function fbSaveActus(actus) {
  return initFirebase().then(function(db) {
    var batch = db.batch();
    return db.collection('actus').get().then(function(snap) {
      snap.docs.forEach(function(d) { batch.delete(d.ref); });
      actus.forEach(function(a) {
        var ref = db.collection('actus').doc(String(a.id));
        batch.set(ref, a);
      });
      return batch.commit();
    });
  });
}

// ── Inscriptions ─────────────────────────────────────────────

function fbLoadInscriptions() {
  return initFirebase().then(function(db) {
    return db.collection('inscriptions').orderBy('id', 'desc').get().then(function(snap) {
      return snap.docs.map(function(d) { return d.data(); });
    });
  });
}

function fbSaveInscription(inscription) {
  return initFirebase().then(function(db) {
    return db.collection('inscriptions').doc(String(inscription.id)).set(inscription);
  });
}

function fbUpdateInscription(id, data) {
  return initFirebase().then(function(db) {
    return db.collection('inscriptions').doc(String(id)).update(data);
  });
}

function fbDeleteInscription(id) {
  return initFirebase().then(function(db) {
    return db.collection('inscriptions').doc(String(id)).delete();
  });
}

(function(){
  // 1. Charger depuis Firebase
  fbLoadComptes().then(function(data){
    if(data && data.length){
      COMPTES.length=0;
      data.forEach(function(c){ COMPTES.push(c); });
    } else {
      // Fallback localStorage
      try{
        var saved=localStorage.getItem("mdm_comptes");
        if(saved){
          var list=JSON.parse(saved);
          COMPTES.length=0;
          list.forEach(function(c){ COMPTES.push(c); });
          // Migration : sauvegarder dans Firebase
          if(list.length) fbSaveComptes(list);
        }
      } catch(e){}
    }
  }).catch(function(){
    // Firebase indisponible → localStorage
    try{
      var saved=localStorage.getItem("mdm_comptes");
      if(saved){ var list=JSON.parse(saved); COMPTES.length=0; list.forEach(function(c){ COMPTES.push(c); }); }
    } catch(e){}
  });
})();

async function doLogin(){
  var login = document.getElementById("login").value.trim();
  var password = document.getElementById("password").value;
  var errorEl = document.getElementById("error-msg");
  var btn = document.getElementById("btn-login");
  var spinner = document.getElementById("spinner");
  var label = document.getElementById("btn-label");

  errorEl.style.display = "none";

  if(!login || !password){
    showError("Veuillez remplir tous les champs.");
    return;
  }

  // Animation
  btn.disabled = true;
  spinner.style.display = "inline-block";
  label.textContent = "Vérification...";

  // Attendre que Firebase ait chargé les comptes (max 3s)
  await new Promise(function(resolve){ setTimeout(resolve, 800); });
  (function(){
    var compte = null;
    for(var i=0;i<COMPTES.length;i++){
      if(COMPTES[i].login === login && COMPTES[i].password === password){
        compte = COMPTES[i];
        break;
      }
    }

    if(compte){
      // Créer token (8h)
      var tokenData = {
        login:      compte.login,
        nom:        compte.nom,
        role:       compte.role,
        remise:     compte.remise    || 0,
        email:      compte.email     || "cspoto@moulindesmoines.com",
        tel:        compte.tel       || "",
        numclient:  compte.numclient || "",
        groupement: compte.groupement|| "",
        ville:      compte.ville     || "",
        cp:         compte.cp        || "",
        commercial:  compte.commercial || "",
        franco:      compte.franco      || 0,

        remises_produits: compte.remises_produits || [],
        exp:         Date.now() + 8 * 60 * 60 * 1000
      };
      var token = btoa(JSON.stringify(tokenData));
      sessionStorage.setItem("mdm_token", token);
      // Redirection
      label.textContent = "Connexion...";
      window.location.href = compte.role === "admin" ? "admin.html" : "commande.html";
    } else {
      btn.disabled = false;
      spinner.style.display = "none";
      label.textContent = "Se connecter";
      showError("Identifiant ou mot de passe incorrect.");
    }
  })();
}

function showError(msg){
  var el = document.getElementById("error-msg");
  el.textContent = msg;
  el.style.display = "block";
  // Relancer l'animation shake
  el.style.animation = "none";
  el.offsetHeight;
  el.style.animation = "shake .3s ease";
}

function togglePw(){
  var input = document.getElementById("password");
  input.type = input.type === "password" ? "text" : "password";
}
</script>
