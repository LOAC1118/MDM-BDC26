<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Messagerie — Moulin des Moines</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,200;1,200&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
/* ════════════════════════════════════════════════════════
   MESSAGERIE MDM — CSS COMPLET
════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f2ee;--card:#fff;--text:#2d2018;--text2:#7a6655;--text3:#b09a8a;
  --accent:#4a7c59;--accent-l:#edf5ef;--terra:#a0522d;--brown:#6b4c3b;
  --border:#e5dcd5;--border-l:#ede8e2;--danger:#c0392b;--green:#2e7d47;
  --shadow:0 1px 4px rgba(45,32,24,.1);--r:8px;
  --header-h:54px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',sans-serif;font-size:13px;font-weight:300;
  color:var(--text);background:var(--bg);display:flex;flex-direction:column}

/* ── HEADER ── */
.msg-header{
  height:var(--header-h);flex-shrink:0;
  background:var(--card);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:12px;
  box-shadow:var(--shadow);z-index:100;
}
.msg-header-logo{
  font-family:'Fraunces',serif;font-weight:200;font-size:16px;
  color:var(--brown);white-space:nowrap;flex-shrink:0;
}
.msg-header-logo em{font-style:italic;color:var(--terra)}
.msg-header-spacer{flex:1}
.msg-header-actions{display:flex;align-items:center;gap:8px}
.msg-back-btn{
  padding:5px 12px;border-radius:6px;font-size:12px;
  text-decoration:none;border:1px solid var(--border);
  background:var(--bg);color:var(--text2);
  display:flex;align-items:center;gap:5px;
  transition:all .15s;font-family:inherit;cursor:pointer;
}
.msg-back-btn:hover{background:var(--accent-l);border-color:var(--accent);color:var(--accent)}
.msg-back-btn.highlight{background:var(--accent);color:#fff;border-color:var(--accent)}
.msg-compose-btn{
  padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;
  border:none;background:var(--accent);color:#fff;cursor:pointer;
  font-family:inherit;display:flex;align-items:center;gap:5px;
  transition:background .15s;
}
.msg-compose-btn:hover{background:#3a6347}

/* ── LAYOUT ── */
.msg-layout{
  flex:1;display:flex;overflow:hidden;min-height:0;
}

/* ── SIDEBAR CONTACTS/CONVERSATIONS ── */
.msg-sidebar{
  width:280px;flex-shrink:0;
  background:var(--card);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.msg-sidebar-head{
  padding:12px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.msg-sidebar-title{font-size:12px;font-weight:600;color:var(--brown)}
.msg-unread-badge{
  background:var(--danger);color:#fff;
  font-size:10px;font-weight:700;padding:2px 6px;
  border-radius:10px;min-width:18px;text-align:center;
  display:none;
}

/* Barre de recherche contacts */
.msg-search-bar{
  padding:8px 12px;border-bottom:1px solid var(--border-l);flex-shrink:0;
}
.msg-search-bar input{
  width:100%;padding:6px 10px 6px 28px;
  border:1.5px solid var(--border);border-radius:6px;
  font-size:12px;font-family:inherit;background:var(--bg);outline:none;
}
.msg-search-bar input:focus{border-color:var(--accent)}
.msg-search-wrap{position:relative}
.msg-search-ico{
  position:absolute;left:8px;top:50%;transform:translateY(-50%);
  color:var(--text3);font-size:11px;pointer-events:none;
}

/* Liste conversations */
.msg-conv-list{flex:1;overflow-y:auto}
.msg-conv-item{
  padding:10px 14px;cursor:pointer;
  border-bottom:1px solid var(--border-l);
  transition:background .1s;
}
.msg-conv-item:hover{background:var(--bg)}
.msg-conv-item.active{background:var(--accent-l)}
.msg-conv-item.unread{background:#fef9f0}
.msg-conv-item-row{
  display:flex;align-items:center;gap:9px;margin-bottom:3px;
}
.msg-conv-avatar{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:500;flex-shrink:0;
}
.msg-conv-avatar.role-client{background:#fff3e0;color:#e65100}
.msg-conv-avatar.role-user{background:var(--accent-l);color:var(--accent)}
.msg-conv-avatar.role-admin{background:#f3e5f5;color:#7b1fa2}
.msg-conv-info{flex:1;min-width:0}
.msg-conv-name{
  font-size:12px;font-weight:500;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.msg-conv-meta{
  display:flex;align-items:center;justify-content:space-between;
}
.msg-conv-preview{
  font-size:11px;color:var(--text3);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  flex:1;
}
.msg-conv-time{font-size:10px;color:var(--text3);flex-shrink:0;margin-left:6px}
.msg-unread-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--danger);flex-shrink:0;
}
.msg-unread-count{
  background:var(--danger);color:#fff;
  font-size:9px;font-weight:700;padding:1px 5px;
  border-radius:8px;flex-shrink:0;
}

/* ── ZONE CHAT ── */
.msg-main{
  flex:1;display:flex;flex-direction:column;overflow:hidden;
  background:var(--bg);
}
.msg-main-head{
  padding:10px 16px;background:var(--card);
  border-bottom:1px solid var(--border);
  display:none;align-items:center;gap:12px;flex-shrink:0;
}
.msg-main-avatar{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:500;flex-shrink:0;
  background:var(--accent-l);color:var(--accent);
}
.msg-main-info{flex:1}
.msg-main-name{font-size:13px;font-weight:500;color:var(--text)}
.msg-main-sub{font-size:11px;color:var(--text3)}
.msg-messages{
  flex:1;overflow-y:auto;padding:16px 14px;
  display:flex;flex-direction:column;gap:2px;
}
.msg-empty-state{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  color:var(--text3);text-align:center;padding:40px;
}
.msg-empty-icon{font-size:48px;margin-bottom:12px;opacity:.4}
.msg-empty-text{font-size:14px;font-weight:300}
.msg-empty-sub{font-size:12px;margin-top:6px;opacity:.7}

/* Séparateur de date */
.msg-day-sep{
  text-align:center;padding:8px 0;font-size:10px;color:var(--text3);
  display:flex;align-items:center;gap:8px;margin:4px 0;
}
.msg-day-sep::before,.msg-day-sep::after{
  content:'';flex:1;height:1px;background:var(--border-l);
}

/* Bulles de messages */
.msg-bubble-wrap{
  display:flex;flex-direction:column;margin-bottom:6px;
}
.msg-bubble-wrap.mine{align-items:flex-end}
.msg-bubble-wrap.theirs{align-items:flex-start}
.msg-sender{
  font-size:10px;color:var(--text3);margin-bottom:3px;padding:0 10px;
}
.msg-bubble{
  max-width:68%;padding:8px 12px;border-radius:12px;
  font-size:12px;line-height:1.55;word-break:break-word;
}
.msg-bubble.mine{
  background:var(--accent);color:#fff;
  border-radius:12px 12px 3px 12px;
}
.msg-bubble.theirs{
  background:var(--card);color:var(--text);
  border:1px solid var(--border);
  border-radius:12px 12px 12px 3px;
}
.msg-bubble-subject{
  font-size:10px;font-weight:600;opacity:.8;margin-bottom:4px;
}
.msg-time{
  font-size:10px;color:var(--text3);margin-top:3px;padding:0 4px;
  display:flex;align-items:center;gap:4px;
}

/* ── BARRE D'ENVOI ── */
.msg-compose-bar{
  padding:10px 14px;background:var(--card);
  border-top:1px solid var(--border);
  display:none;align-items:flex-end;gap:8px;flex-shrink:0;
}
.msg-input-wrap{flex:1;position:relative}
.msg-input{
  width:100%;padding:9px 12px;
  border:1.5px solid var(--border);border-radius:20px;
  font-family:inherit;font-size:12px;resize:none;
  outline:none;max-height:120px;min-height:38px;
  background:#fff;color:var(--text);
  transition:border-color .15s;line-height:1.4;
}
.msg-input:focus{border-color:var(--accent)}
.msg-send-btn{
  width:36px;height:36px;border-radius:50%;border:none;
  background:var(--accent);color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;transition:background .15s;
}
.msg-send-btn:hover{background:#3a6347}
.msg-send-btn:disabled{opacity:.4;cursor:not-allowed}

/* ── PANNEAU COMPOSE ── */
.compose-overlay{
  position:fixed;inset:0;background:rgba(45,32,24,.4);
  z-index:500;display:none;align-items:center;justify-content:center;
  padding:20px;
}
.compose-overlay.open{display:flex}
.compose-panel{
  background:var(--card);border-radius:12px;width:100%;
  max-width:480px;box-shadow:0 16px 48px rgba(45,32,24,.2);
  overflow:hidden;
}
.compose-head{
  padding:14px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.compose-title{font-size:14px;font-weight:500;color:var(--text)}
.compose-close{
  width:24px;height:24px;border:none;background:none;
  font-size:16px;cursor:pointer;color:var(--text3);
  border-radius:4px;display:flex;align-items:center;justify-content:center;
}
.compose-close:hover{background:var(--bg)}
.compose-body{padding:16px 18px}
.compose-fg{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.compose-fg label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;color:var(--text3)}
.compose-fg select,.compose-fg input,.compose-fg textarea{
  padding:8px 11px;border:1.5px solid var(--border);border-radius:6px;
  font-family:inherit;font-size:12px;background:#fff;color:var(--text);
  outline:none;transition:border-color .15s;
}
.compose-fg select:focus,.compose-fg input:focus,.compose-fg textarea:focus{border-color:var(--accent)}
.compose-footer{
  padding:12px 18px;border-top:1px solid var(--border);
  display:flex;justify-content:flex-end;gap:8px;background:var(--bg);
}
.compose-cancel{
  padding:7px 16px;border:1px solid var(--border);border-radius:6px;
  background:#fff;color:var(--text2);font-family:inherit;font-size:12px;
  cursor:pointer;
}
.compose-send{
  padding:7px 18px;border:none;border-radius:6px;
  background:var(--accent);color:#fff;font-family:inherit;
  font-size:12px;font-weight:500;cursor:pointer;
}

/* ── TOAST ── */
#_msg_toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:var(--text);color:#fff;padding:8px 16px;
  border-radius:8px;font-size:12px;z-index:9999;
  opacity:0;transition:opacity .25s;pointer-events:none;
  font-family:'Inter',sans-serif;white-space:nowrap;
}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .msg-sidebar{
    position:fixed;top:var(--header-h);left:0;bottom:0;
    z-index:200;transform:translateX(-100%);
    transition:transform .25s cubic-bezier(.4,0,.2,1);
    box-shadow:none;width:260px;
  }
  .msg-sidebar.mob-open{
    transform:translateX(0);
    box-shadow:4px 0 20px rgba(45,32,24,.15);
  }
  .msg-mob-toggle{
    display:flex;align-items:center;gap:8px;
    padding:6px 12px;border:1px solid var(--border);
    border-radius:6px;background:var(--bg);color:var(--text2);
    font-size:12px;cursor:pointer;font-family:inherit;
  }
  .msg-mob-overlay{
    display:none;position:fixed;inset:0;
    background:rgba(45,32,24,.4);z-index:199;
  }
  .msg-mob-overlay.open{display:block}
  .msg-bubble{max-width:85%}
}
@media(min-width:769px){
  .msg-mob-toggle{display:none}
  .msg-mob-overlay{display:none!important}
}
</style>
</head>
<body>

<!-- OVERLAY MOBILE SIDEBAR -->
<div class="msg-mob-overlay" id="msg-mob-overlay" onclick="closeMobSidebar()"></div>

<!-- HEADER -->
<header class="msg-header">
  <button class="msg-mob-toggle" onclick="toggleMobSidebar()" aria-label="Conversations">
    &#9776; <span id="mob-conv-count" style="font-size:10px;background:var(--danger);color:#fff;padding:1px 5px;border-radius:8px;display:none"></span>
  </button>
  <div class="msg-header-logo">Moulin <em>des</em> Moines</div>
  <span style="font-size:12px;color:var(--text3);font-weight:300">&nbsp;Messagerie</span>
  <div class="msg-header-spacer"></div>
  <div class="msg-header-actions">
    <button class="msg-compose-btn" onclick="openCompose()">&#9998;&nbsp;Nouveau message</button>
    <a href="dashboard.html" id="msg-back-btn" class="msg-back-btn">&#8592; Tableau de bord</a>
  </div>
</header>

<!-- LAYOUT -->
<div class="msg-layout">

  <!-- SIDEBAR CONVERSATIONS -->
  <div class="msg-sidebar" id="msg-sidebar">
    <div class="msg-sidebar-head">
      <span class="msg-sidebar-title">Conversations</span>
      <span class="msg-unread-badge" id="unread-badge">0</span>
    </div>
    <div class="msg-search-bar">
      <div class="msg-search-wrap">
        <span class="msg-search-ico">&#128269;</span>
        <input type="text" placeholder="Rechercher&#8230;" oninput="filterConvs(this.value)">
      </div>
    </div>
    <div class="msg-conv-list" id="conv-list">
      <div style="padding:20px;text-align:center;color:var(--text3);font-size:12px">Chargement&#8230;</div>
    </div>
  </div>

  <!-- ZONE CHAT -->
  <div class="msg-main">
    <!-- Header chat -->
    <div class="msg-main-head" id="msg-main-head">
      <div class="msg-main-avatar role-client" id="msg-main-avatar">?</div>
      <div class="msg-main-info">
        <div class="msg-main-name" id="msg-main-name"></div>
        <div class="msg-main-sub" id="msg-main-sub"></div>
      </div>
    </div>

    <!-- Messages -->
    <div class="msg-messages" id="msg-messages">
      <div class="msg-empty-state" id="msg-empty-state">
        <div class="msg-empty-icon">&#128172;</div>
        <div class="msg-empty-text">S&eacute;lectionnez une conversation</div>
        <div class="msg-empty-sub">ou d&eacute;marrez&nbsp;en cliquant sur &laquo;&nbsp;Nouveau message&nbsp;&raquo;</div>
      </div>
    </div>

    <!-- Barre envoi -->
    <div class="msg-compose-bar" id="msg-compose-bar">
      <div class="msg-input-wrap">
        <textarea class="msg-input" id="msg-input" rows="1"
          placeholder="Votre message&#8230;"
          oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
      </div>
      <button class="msg-send-btn" id="msg-send-btn" onclick="sendMessage()" title="Envoyer">&#9654;</button>
    </div>
  </div>

</div>

<!-- COMPOSE PANEL -->
<div class="compose-overlay" id="compose-overlay" onclick="if(event.target===this)closeCompose()">
  <div class="compose-panel">
    <div class="compose-head">
      <span class="compose-title">&#9998; Nouveau message</span>
      <button class="compose-close" onclick="closeCompose()">&#10005;</button>
    </div>
    <div class="compose-body">
      <div class="compose-fg">
        <label>Destinataire <span style="color:var(--danger)">*</span></label>
        <select id="compose-to"><option value="">-- Choisir --</option></select>
      </div>
      <div class="compose-fg">
        <label>Sujet <span style="font-weight:300;color:var(--text3)">(optionnel)</span></label>
        <input type="text" id="compose-subject" placeholder="ex&#160;: Commande Paques 2026">
      </div>
      <div class="compose-fg">
        <label>Message <span style="color:var(--danger)">*</span></label>
        <textarea id="compose-body-input" rows="4"
          placeholder="Votre message&#8230;" style="resize:vertical"></textarea>
      </div>
    </div>
    <div class="compose-footer">
      <button class="compose-cancel" onclick="closeCompose()">Annuler</button>
      <button class="compose-send" onclick="sendNewMessage()">&#9993; Envoyer</button>
    </div>
  </div>
</div>

<div id="_msg_toast"></div>

<script>


var FIREBASE_CONFIG = {
  apiKey:            "AIzaSyB000QDa4c-vMjO1Xuimw58iiRvwgbF1zc",
  authDomain:        "mdm-bdc26.firebaseapp.com",
  projectId:         "mdm-bdc26",
  storageBucket:     "mdm-bdc26.firebasestorage.app",
  messagingSenderId: "52658530893",
  appId:             "1:52658530893:web:166626ae4d681465ddca04"
};

var _fbReady=false, _fbDb=null;
var _myLogin='', _myNom='', _myRole='';
var _activeConvId=null;
var _msgUnsub=null, _convUnsubs=[];
var _contacts=[];
var _searchQuery='';

function _initFB(){
  if(_fbReady) return Promise.resolve(_fbDb);
  return new Promise(function(resolve,reject){
    try{
      if(!firebase.apps||!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
      _fbDb=firebase.firestore(); _fbReady=true; resolve(_fbDb);
    }catch(e){reject(e);}
  });
}

function _b64d(s){
  try{ return atob(s.replace(/-/g,'+').replace(/_/g,'/')); }catch(e){ return '{}'; }
}

function _getUser(){
  try{
    var t=sessionStorage.getItem('mdm_token');
    if(!t) return null;
    var parts=t.split('.');
    var raw=parts.length===3?parts[1]:t;
    var d=JSON.parse(_b64d(raw));
    return d.login?d:null;
  }catch(e){ return null; }
}

function _esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function _toast(msg,dur){
  var t=document.getElementById('_msg_toast');
  if(!t) return;
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(t._tmr);
  t._tmr=setTimeout(function(){t.style.opacity='0';},dur||3000);
}

function _convId(a,b){ return [a,b].sort().join('_'); }

function _roleLabel(role){
  return role==='user'?'Commercial':role==='admin'?'Admin':'Client';
}
function _roleClass(role){
  return role==='user'?'role-user':role==='admin'?'role-admin':'role-client';
}
function _avatarInitial(nom){
  return (nom||'?').charAt(0).toUpperCase();
}

// ── Init au chargement ────────────────────────────────────────
window.addEventListener('DOMContentLoaded',function(){
  var user=_getUser();
  if(!user){ window.location.href='index.html'; return; }
  _myLogin=user.login;
  _myNom=user.nom||user.login;
  _myRole=user.role||'client';

  // Bouton retour avec param ?back=
  var params=new URLSearchParams(window.location.search);
  var back=params.get('back');
  var backBtn=document.getElementById('msg-back-btn');
  if(backBtn){
    var labels={'commande.html':'\u2190 Bon de commande','dashboard.html':'\u2190 Tableau de bord'};
    if(back){
      backBtn.textContent=labels[back]||'\u2190 Retour';
      backBtn.href=back;
      backBtn.classList.add('highlight');
    } else {
      backBtn.href='dashboard.html';
      backBtn.textContent='\u2190 Tableau de bord';
    }
  }

  // Param ?with= pour ouvrir directement une conv
  var withLogin=params.get('with');

  loadContacts().then(function(){
    loadConversations();
    if(withLogin){
      setTimeout(function(){
        var contact=_contacts.find(function(c){return c.login===withLogin;});
        var nom=contact?(contact.nom||contact.login):withLogin;
        openConv(_convId(_myLogin,withLogin),nom);
      },600);
    }
  });

  // Fermer sidebar au départ si mobile
  window.addEventListener('beforeunload',function(){
    if(_activeConvId){
      try{ localStorage.setItem('mdm_lastread_'+_activeConvId,String(Date.now())); }catch(e){}
    }
  });
});

// ── Contacts ─────────────────────────────────────────────────
function loadContacts(){
  return _initFB().then(function(db){
    return db.collection('comptes').get().then(function(snap){
      var all=snap.docs.map(function(d){ return d.data(); });
      if(_myRole==='client'){
        _contacts=all.filter(function(c){ return c.role==='user'||c.role==='admin'; });
      } else if(_myRole==='user'){
        _contacts=all.filter(function(c){
          return (c.role==='client'&&c.commercial===_myLogin)||c.role==='admin';
        });
      } else {
        _contacts=all.filter(function(c){ return c.login!==_myLogin; });
      }
      _contacts.sort(function(a,b){
        return (a.nom||a.login).localeCompare(b.nom||b.login,'fr');
      });
      // Remplir le select compose
      _fillComposeSelect();
    });
  }).catch(function(e){ console.warn('loadContacts:',e); });
}

function _fillComposeSelect(){
  var sel=document.getElementById('compose-to');
  if(!sel) return;
  sel.innerHTML='<option value="">-- Choisir --</option>';
  _contacts.forEach(function(c){
    var o=document.createElement('option');
    o.value=c.login;
    o.textContent=(c.nom||c.login)+' ('+_roleLabel(c.role)+')';
    sel.appendChild(o);
  });
}

// ── Conversations temps réel ──────────────────────────────────
function loadConversations(){
  _convUnsubs.forEach(function(u){try{u();}catch(e){}});
  _convUnsubs=[];
  var _convsMap={};

  function _render(){
    var list=Object.values(_convsMap).filter(function(c){return c&&c._id;});
    list.sort(function(a,b){ return (b.lastTs||0)-(a.lastTs||0); });
    renderConvList(list);
  }

  _initFB().then(function(db){
    // Construire la liste des IDs de conv possibles
    var ids=[];
    _contacts.forEach(function(c){
      ids.push(_convId(_myLogin,c.login));
    });
    ids=ids.filter(function(id,i){ return ids.indexOf(id)===i; });

    if(!ids.length){ renderConvList([]); return; }

    ids.forEach(function(id){
      var unsub=db.collection('chats').doc(id).onSnapshot(function(doc){
        if(doc.exists){
          _convsMap[id]=Object.assign({_id:id},doc.data());
        } else {
          delete _convsMap[id];
        }
        _render();
      },function(e){ console.warn('conv watch '+id+':', e.code); });
      _convUnsubs.push(unsub);
    });
  }).catch(function(e){
    var list=document.getElementById('conv-list');
    if(list) list.innerHTML='<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px">\u26a0 Erreur connexion. Actualisez.</div>';
  });
}

function renderConvList(convs){
  var list=document.getElementById('conv-list');
  if(!list) return;

  // Filtrer par recherche
  var q=_searchQuery.toLowerCase().trim();
  var filtered=q?convs.filter(function(c){
    var parts=c._id.split('_');
    var partnerLogin=parts.filter(function(p){return p!==_myLogin;})[0]||'';
    var contact=_contacts.find(function(x){return x.login===partnerLogin;});
    var nom=contact?(contact.nom||contact.login):partnerLogin;
    return nom.toLowerCase().indexOf(q)>=0||partnerLogin.toLowerCase().indexOf(q)>=0;
  }):convs;

  var totalUnread=0;
  convs.forEach(function(c){ totalUnread+=c['unread_'+_myLogin]||0; });

  // Badge sidebar
  var badge=document.getElementById('unread-badge');
  if(badge){
    badge.textContent=totalUnread;
    badge.style.display=totalUnread>0?'inline':'none';
  }

  if(!filtered.length){
    list.innerHTML='<div style="padding:24px 16px;text-align:center;color:var(--text3);font-size:12px">'
      +(q?'\u{1F50D} Aucun r\u00e9sultat pour \u00ab\u00a0'+_esc(q)+'\u00a0\u00bb':'&#128172; Aucune conversation.<br><span style="font-size:11px">Cliquez sur \u00ab\u00a0Nouveau message\u00a0\u00bb</span>')
      +'</div>';
    return;
  }

  list.innerHTML=filtered.map(function(c){
    var parts=c._id.split('_');
    var partnerLogin=parts.filter(function(p){return p!==_myLogin;})[0]||'';
    var contact=_contacts.find(function(x){return x.login===partnerLogin;});
    var nom=contact?(contact.nom||contact.login):partnerLogin;
    var role=contact?contact.role:'client';
    var preview=_esc((c.lastMsg||'').substring(0,50))||'Nouvelle conversation';
    var time='';
    if(c.lastTs){
      var dt=new Date(c.lastTs),now=new Date();
      time=dt.toDateString()===now.toDateString()
        ?dt.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})
        :dt.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'});
    }
    var unread=c['unread_'+_myLogin]||0;
    var isActive=c._id===_activeConvId;
    var cls='msg-conv-item'+(unread>0?' unread':'')+(isActive?' active':'');

    return '<div class="'+cls+'" data-cid="'+c._id+'" data-nom="'+_esc(nom)+'" data-role="'+role+'"'
      +' onclick="var el=this;openConv(el.dataset.cid,el.dataset.nom,el.dataset.role)">'
      +'<div class="msg-conv-item-row">'
      +'<div class="msg-conv-avatar '+_roleClass(role)+'">'+(nom.charAt(0).toUpperCase())+'</div>'
      +'<div class="msg-conv-info">'
      +'<div style="display:flex;align-items:center;justify-content:space-between">'
      +'<span class="msg-conv-name">'+_esc(nom)+'</span>'
      +(unread>0?'<span class="msg-unread-count">'+unread+'</span>':'<span class="msg-conv-time">'+time+'</span>')
      +'</div>'
      +'<div class="msg-conv-meta">'
      +'<span class="msg-conv-preview">'+preview+'</span>'
      +(unread===0?'':'<span class="msg-conv-time">'+time+'</span>')
      +'</div>'
      +'</div></div></div>';
  }).join('');
}

// ── Ouvrir une conv ───────────────────────────────────────────
function openConv(convId,nom,role){
  _activeConvId=convId;
  try{ localStorage.setItem('mdm_lastread_'+convId,String(Date.now())); }catch(e){}

  // Update sidebar
  document.querySelectorAll('.msg-conv-item').forEach(function(el){
    el.classList.toggle('active',el.dataset.cid===convId);
  });

  // Header chat
  var head=document.getElementById('msg-main-head');
  if(head) head.style.display='flex';
  var nameEl=document.getElementById('msg-main-name');
  if(nameEl) nameEl.textContent=nom;
  var subEl=document.getElementById('msg-main-sub');
  if(subEl) subEl.textContent=_roleLabel(role||'client');
  var avatarEl=document.getElementById('msg-main-avatar');
  if(avatarEl){
    avatarEl.textContent=(nom||'?').charAt(0).toUpperCase();
    avatarEl.className='msg-main-avatar '+_roleClass(role||'client');
  }

  // Barre envoi
  var bar=document.getElementById('msg-compose-bar');
  if(bar) bar.style.display='flex';

  // Masquer empty state
  var emp=document.getElementById('msg-empty-state');
  if(emp) emp.style.display='none';

  // Marquer lu
  _markRead(convId);

  // Écouter messages
  if(_msgUnsub){ _msgUnsub(); _msgUnsub=null; }
  _initFB().then(function(db){
    _msgUnsub=db.collection('chats').doc(convId).collection('messages')
      .orderBy('ts','asc').limitToLast(150)
      .onSnapshot(function(snap){
        renderMessages(snap.docs.map(function(d){return Object.assign({_id:d.id},d.data());}));
        _markRead(convId);
      },function(e){ console.warn('msg snap:',e); });
  });

  // Fermer sidebar sur mobile
  if(window.innerWidth<=768) closeMobSidebar();

  // Focus input
  setTimeout(function(){
    var inp=document.getElementById('msg-input');
    if(inp) inp.focus();
  },100);
}

// ── Rendu messages ────────────────────────────────────────────
function renderMessages(msgs){
  var container=document.getElementById('msg-messages');
  if(!container) return;

  if(!msgs.length){
    container.innerHTML='<div class="msg-empty-state" style="flex:1">'
      +'<div class="msg-empty-icon">&#128172;</div>'
      +'<div class="msg-empty-text">D\u00e9marrez la conversation</div>'
      +'<div class="msg-empty-sub">Envoyez votre premier message</div></div>';
    return;
  }

  var html=''; var lastDate='';
  msgs.forEach(function(m){
    var mine=m.from===_myLogin;
    var dt=m.ts?new Date(m.ts):null;
    var dateStr=dt?dt.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'}):'';
    var timeStr=dt?dt.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}):'';

    if(dateStr&&dateStr!==lastDate){
      html+='<div class="msg-day-sep"><span>'+dateStr+'</span></div>';
      lastDate=dateStr;
    }

    html+='<div class="msg-bubble-wrap '+(mine?'mine':'theirs')+'">';
    if(!mine) html+='<div class="msg-sender">'+_esc(m.fromNom||m.from)+'</div>';
    html+='<div class="msg-bubble '+(mine?'mine':'theirs')+'">';
    if(m.subject) html+='<div class="msg-bubble-subject">'+_esc(m.subject)+'</div>';
    html+=_esc(m.text).replace(/\n/g,'<br>')+'</div>';
    html+='<div class="msg-time">'+timeStr+(mine?'<span style="opacity:.6;font-size:10px">\u2713</span>':'')+'</div>';
    html+='</div>';
  });

  container.innerHTML=html;
  container.scrollTop=container.scrollHeight;
}

function _markRead(convId){
  _initFB().then(function(db){
    var upd={}; upd['unread_'+_myLogin]=0;
    db.collection('chats').doc(convId).set(upd,{merge:true}).catch(function(){});
  });
}

// ── Envoyer ──────────────────────────────────────────────────
function sendMessage(){
  var inp=document.getElementById('msg-input');
  if(!inp||!_activeConvId) return;
  var text=inp.value.trim();
  if(!text) return;
  inp.value=''; inp.style.height='auto';

  var msg={from:_myLogin,fromNom:_myNom,text:text,ts:Date.now()};
  var btn=document.getElementById('msg-send-btn');
  if(btn) btn.disabled=true;

  _initFB().then(function(db){
    return db.collection('chats').doc(_activeConvId)
      .collection('messages').add(msg)
      .then(function(){
        var parts=_activeConvId.split('_');
        var partner=parts.filter(function(p){return p!==_myLogin;})[0]||'';
        var upd={lastMsg:text,lastTs:msg.ts,lastFrom:_myLogin,lastSender:_myLogin};
        if(partner) upd['unread_'+partner]=firebase.firestore.FieldValue.increment(1);
        upd['unread_'+_myLogin]=0;
        return db.collection('chats').doc(_activeConvId).set(upd,{merge:true});
      });
  })
  .then(function(){ if(btn) btn.disabled=false; })
  .catch(function(e){ _toast('\u26a0 '+e.message); if(btn) btn.disabled=false; });
}

// ── Compose (nouveau message) ─────────────────────────────────
function openCompose(){
  document.getElementById('compose-overlay').classList.add('open');
  document.getElementById('compose-subject').value='';
  document.getElementById('compose-body-input').value='';
  setTimeout(function(){document.getElementById('compose-to').focus();},150);
}
function closeCompose(){
  document.getElementById('compose-overlay').classList.remove('open');
}
function sendNewMessage(){
  var to=document.getElementById('compose-to').value;
  var subject=document.getElementById('compose-subject').value.trim();
  var body=document.getElementById('compose-body-input').value.trim();
  if(!to){ _toast('\u26a0 Choisissez un destinataire'); return; }
  if(!body){ _toast('\u26a0 Écrivez un message'); return; }

  var convId=_convId(_myLogin,to);
  var msg={from:_myLogin,fromNom:_myNom,text:body,subject:subject||null,ts:Date.now()};

  _initFB().then(function(db){
    return db.collection('chats').doc(convId).collection('messages').add(msg)
      .then(function(){
        var upd={lastMsg:body,lastTs:msg.ts,lastFrom:_myLogin,lastSender:_myLogin,participants:[_myLogin,to]};
        upd['unread_'+to]=firebase.firestore.FieldValue.increment(1);
        upd['unread_'+_myLogin]=0;
        return db.collection('chats').doc(convId).set(upd,{merge:true});
      });
  }).then(function(){
    closeCompose();
    _toast('\u2705 Message envoy\u00e9');
    var contact=_contacts.find(function(c){return c.login===to;});
    var nom=contact?(contact.nom||contact.login):to;
    setTimeout(function(){ openConv(convId,nom,contact?contact.role:'client'); },300);
  }).catch(function(e){ _toast('\u26a0 '+e.message); });
}

// ── Recherche ─────────────────────────────────────────────────
function filterConvs(q){
  _searchQuery=q||'';
  // Re-render avec le filtre actif
  var fake=[];
  _convUnsubs; // forcer re-render via renderConvList avec données actuelles
  // Déclencher _render dans loadConversations via un doc onSnapshot vide
  // Plus simple : re-render depuis _convsMap partagé
  // On déclenche via un event
  document.dispatchEvent(new CustomEvent('mdm-conv-filter'));
}

// ── Mobile sidebar ────────────────────────────────────────────
function toggleMobSidebar(){
  var sb=document.querySelector('.msg-sidebar');
  var ov=document.getElementById('msg-mob-overlay');
  if(!sb) return;
  var open=sb.classList.toggle('mob-open');
  if(ov) ov.classList.toggle('open',open);
}
function closeMobSidebar(){
  var sb=document.querySelector('.msg-sidebar');
  var ov=document.getElementById('msg-mob-overlay');
  if(sb) sb.classList.remove('mob-open');
  if(ov) ov.classList.remove('open');
}

// ── Enter pour envoyer ────────────────────────────────────────
document.addEventListener('keydown',function(e){
  if(e.target.id==='msg-input'&&e.key==='Enter'&&!e.shiftKey){
    e.preventDefault(); sendMessage();
  }
});

</script>
