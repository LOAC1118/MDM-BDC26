<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mes notes — Moulin des Moines</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,200;0,400;1,200&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>

:root{--bg:#faf8f5;--bg-card:#fff;--bg-beige:#f0ebe3;--bg-beige-dark:#e8dfd4;--text:#5c4a38;--text-secondary:#a89080;--text-muted:#c0b0a0;--accent:#4a7c59;--accent-light:#eef4f0;--accent-hover:#3d6b4a;--terra:#a0522d;--brown:#78503c;--border:#e8e0d6;--border-light:#f0e8e0;--shadow:rgba(92,74,56,.08);--danger:#c0392b;--danger-light:#fdecea;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;font-weight:300;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
.ph{background:var(--bg-card);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.logo{font-family:'Fraunces',serif;font-weight:200;font-size:18px;color:var(--brown)}.logo em{font-style:italic;color:var(--terra)}
.back{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text-secondary);font-size:12px;cursor:pointer;text-decoration:none;transition:all .15s;font-family:'Inter',sans-serif}
.back:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.pb{flex:1;max-width:720px;width:100%;margin:0 auto;padding:28px 20px 60px}
.pt{font-family:'Fraunces',serif;font-weight:200;font-size:26px;color:var(--brown);margin-bottom:6px}
.ps{font-size:12px;font-weight:300;color:var(--text-muted);margin-bottom:16px}
.ub{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;background:var(--accent-light);border-radius:10px;font-size:11px;color:var(--accent);margin-bottom:20px}
.cc{font-size:10px;color:var(--text-muted);text-align:right;margin-top:2px}
.sl{font-size:11px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px}
/* ── MODULE NOTES ── */
.notes-card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px}
.notes-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border-light);background:var(--bg)}
.notes-title{font-size:13px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:8px}
.notes-body{padding:16px}
.notes-compose{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;background:var(--bg-beige);border-radius:8px;padding:12px}
.notes-compose textarea{width:100%;min-height:80px;padding:10px;border:1px solid var(--border);border-radius:6px;font-family:'Inter',sans-serif;font-size:13px;font-weight:300;color:var(--text);background:var(--bg-card);resize:vertical;line-height:1.6;box-sizing:border-box}
.notes-compose textarea:focus{outline:none;border-color:var(--accent)}
.notes-compose-footer{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.notes-attach-btn{padding:6px 12px;border-radius:5px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);font-size:11px;font-weight:400;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;display:flex;align-items:center;gap:5px}
.notes-attach-btn:hover{border-color:var(--accent);color:var(--accent)}
.notes-send-btn{padding:7px 16px;border-radius:6px;border:none;background:var(--accent);color:#fff;font-size:12px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;margin-left:auto;transition:background .15s}
.notes-send-btn:hover{background:var(--accent-hover)}
.notes-send-btn:disabled{opacity:.5;cursor:not-allowed}
.notes-attachments-preview{display:flex;flex-wrap:wrap;gap:6px}
.note-attach-chip{display:flex;align-items:center;gap:5px;padding:3px 8px;background:var(--bg-card);border:1px solid var(--border);border-radius:4px;font-size:11px;color:var(--text-secondary)}
.note-attach-chip button{background:none;border:none;cursor:pointer;color:var(--danger);font-size:12px;padding:0;line-height:1}
.notes-list{display:flex;flex-direction:column;gap:10px}
.note-item{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:12px 14px;transition:box-shadow .15s}
.note-item:hover{box-shadow:0 2px 8px var(--shadow)}
.note-item-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.note-item-date{font-size:10px;font-weight:300;color:var(--text-muted)}
.note-item-del{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:13px;padding:2px 5px;border-radius:4px;transition:color .15s}
.note-item-del:hover{color:var(--danger)}
.note-item-text{font-size:13px;font-weight:300;color:var(--text);line-height:1.7;white-space:pre-wrap;margin-bottom:8px}
.note-item-files{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.note-file-link{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:var(--bg-beige);border:1px solid var(--border);border-radius:5px;font-size:11px;color:var(--accent);text-decoration:none;font-weight:400;transition:background .15s}
.note-file-link:hover{background:var(--accent-light)}
.note-file-icon{font-size:13px}
.notes-empty{text-align:center;padding:30px;color:var(--text-muted);font-size:13px;font-weight:300}
.notes-loading{text-align:center;padding:20px;color:var(--text-muted);font-size:12px}
.notes-upload-progress{height:3px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:4px}
.notes-upload-progress-bar{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}


.notes-compose textarea{min-height:120px;font-size:14px}.note-item-text{font-size:13px;line-height:1.8}

</style>
</head>
<body>
<header class="ph">
  <div class="logo">Moulin <em>des</em> Moines</div>
  <a id="back-btn" href="dashboard.html" class="back">&#8592; Retour</a>
</header>
<div class="pb">
  <div class="pt">&#128203; Mes notes</div>
  <div class="ps">Notes priv&#233;es &#8212; visibles uniquement par vous</div>
  <div class="ub" id="user-badge">&#128100; Chargement&#8230;</div>
  <!-- Sélecteur de compte (commercial uniquement) -->
  <div id="client-selector-wrap" style="display:none;margin-bottom:14px">
    <label style="font-size:11px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px">
      &#128101; Enregistrer une note pour :
    </label>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <select id="note-target-select" style="flex:1;min-width:200px;padding:8px 12px;border:1.5px solid var(--border);border-radius:7px;font-family:'Inter',sans-serif;font-size:12px;background:var(--bg-card);color:var(--text);outline:none;cursor:pointer">
        <option value="">&#128100; Mes propres notes</option>
      </select>
      <span id="note-target-badge" style="font-size:10px;font-weight:300;color:var(--text-muted)"></span>
    </div>
  </div>
  <div class="notes-compose">
    <textarea id="note-text-input" placeholder="R&#233;digez votre note&#8230;"></textarea>
    <div class="cc" id="note-char-count">0 / 2000</div>
    <div class="notes-compose-footer">
      <span style="font-size:11px;font-weight:300;color:var(--text-muted)">Espace priv&#233;</span>
      <button class="notes-send-btn" id="note-send-btn" onclick="saveNote()">&#128203;&nbsp;Enregistrer</button>
    </div>
  </div>
  <div style="margin-top:24px">
    <div class="sl">Historique</div>
    <div class="notes-list" id="notes-list"><div class="notes-loading">Chargement&#8230;</div></div>
  </div>
</div>


<script>

// ── Variables globales ───────────────────────────────────────
var _fbApp=null, _fbDb=null;
var _notesUnsub=null;
var _currentTarget=null;

// ── Firebase ─────────────────────────────────────────────────
var FIREBASE_CONFIG={apiKey:"AIzaSyB000QDa4c-vMjO1Xuimw58iiRvwgbF1zc",authDomain:"mdm-bdc26.firebaseapp.com",projectId:"mdm-bdc26",storageBucket:"mdm-bdc26.firebasestorage.app",messagingSenderId:"52658530893",appId:"1:52658530893:web:166626ae4d681465ddca04"};

function _initFB(){
  if(_fbDb) return Promise.resolve(_fbDb);
  try{
    _fbApp=firebase.apps.length?firebase.apps[0]:firebase.initializeApp(FIREBASE_CONFIG);
  }catch(e){
    _fbApp=firebase.app();
  }
  _fbDb=firebase.firestore(_fbApp);
  return Promise.resolve(_fbDb);
}

// ── Auth ─────────────────────────────────────────────────────
function _safeB64Decode(s){
  try{return atob(s.replace(/-/g,'+').replace(/_/g,'/'));}catch(e){return '{}';}
}
function _getLogin(){
  try{
    var t=sessionStorage.getItem('mdm_token');
    if(!t) return null;
    var d=JSON.parse(_safeB64Decode(t));
    return d.login||null;
  }catch(e){return null;}
}
function _getRole(){
  try{
    var t=sessionStorage.getItem('mdm_token');
    if(!t) return 'client';
    return JSON.parse(_safeB64Decode(t)).role||'client';
  }catch(e){return 'client';}
}
function _getNom(){
  try{
    var t=sessionStorage.getItem('mdm_token');
    if(!t) return '';
    var d=JSON.parse(_safeB64Decode(t));
    return d.nom||d.login||'';
  }catch(e){return '';}
}
function _getReturnPage(){
  var r=document.referrer;
  if(r&&r.indexOf('commande.html')>=0) return 'commande.html';
  if(r&&r.indexOf('admin.html')>=0) return 'admin.html';
  return 'dashboard.html';
}

// ── Toast ─────────────────────────────────────────────────────
function showToast(msg,dur){
  var t=document.getElementById('_toast');
  if(!t){
    t=document.createElement('div');t.id='_toast';
    t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#5c4a38;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.2);opacity:0;transition:opacity .3s;white-space:nowrap;pointer-events:none;font-family:Inter,sans-serif';
    document.body.appendChild(t);
  }
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._t);t._t=setTimeout(function(){t.style.opacity='0';},dur||3000);
}

// ── Sélecteur clients (commercial/admin) ─────────────────────
function _loadClients(login,role){
  var wrap=document.getElementById('client-selector-wrap');
  if(wrap) wrap.style.display='block';
  var sel=document.getElementById('note-target-select');
  if(!sel) return;
  sel.innerHTML='<option value="">\u{1F464} Mes propres notes</option><option disabled>Chargement...</option>';
  _initFB().then(function(db){
    return db.collection('comptes').get();
  }).then(function(snap){
    var all=snap.docs.map(function(d){return d.data();});
    var list;
    if(role==='admin'){
      list=all.filter(function(c){return c.role==='client'||c.role==='user';});
    } else {
      list=all.filter(function(c){return c.role==='client'&&c.commercial===login;});
    }
    sel.innerHTML='<option value="">\u{1F464} Mes propres notes</option>';
    list.sort(function(a,b){return (a.nom||a.login).localeCompare(b.nom||b.login);});
    list.forEach(function(c){
      var o=document.createElement('option');
      o.value=c.login;
      o.textContent=(c.nom||c.login)+(c.ville?' — '+c.ville:'');
      sel.appendChild(o);
    });
    // Présélection via URL ?client=
    var urlParams=new URLSearchParams(window.location.search);
    var cp=urlParams.get('client');
    if(cp){
      for(var i=0;i<sel.options.length;i++){
        if(sel.options[i].value===cp){
          sel.value=cp;
          _currentTarget=cp;
          _updateSubtitle(sel);
          _notesListen(cp);
          break;
        }
      }
    }
  }).catch(function(e){
    sel.innerHTML='<option value="">\u{1F464} Mes propres notes</option>';
    showToast('\u26a0 Impossible de charger les clients');
    console.error(e);
  });
}

function _updateSubtitle(sel){
  var sub=document.querySelector('.ps');
  if(!sub) return;
  if(sel&&sel.value&&sel.selectedIndex>=0){
    sub.textContent='Notes pour\u00a0: '+sel.options[sel.selectedIndex].text;
  } else {
    sub.textContent='Notes priv\u00e9es \u2014 visibles uniquement par vous';
  }
}

// ── Notes Firestore ───────────────────────────────────────────
function _notesListen(login){
  if(_notesUnsub){_notesUnsub();_notesUnsub=null;}
  var list=document.getElementById('notes-list');
  if(list) list.innerHTML='<div class="notes-loading">Chargement\u2026</div>';
  _initFB().then(function(db){
    _notesUnsub=db.collection('notes').doc(login).collection('items')
      .orderBy('createdAt','desc').limit(100)
      .onSnapshot(function(snap){
        _renderNotes(snap.docs.map(function(d){return Object.assign({_id:d.id},d.data());}));
      },function(e){
        console.error('Notes listen error:',e);
        if(list) list.innerHTML='<div class="notes-empty">\u26a0 Erreur : '+e.code+'</div>';
      });
  }).catch(function(e){
    console.error('initFB error:',e);
    if(list) list.innerHTML='<div class="notes-empty">\u26a0 Firebase non disponible</div>';
  });
}

function _renderNotes(notes){
  var list=document.getElementById('notes-list');
  if(!list) return;
  if(!notes.length){
    list.innerHTML='<div class="notes-empty">Aucune note. R\u00e9digez votre premi\u00e8re note ci-dessus.</div>';
    return;
  }
  list.innerHTML=notes.map(function(n){
    var date='';
    if(n.createdAt&&n.createdAt.toDate)
      date=n.createdAt.toDate().toLocaleString('fr-FR',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
    var auteur=n.auteur&&n.auteur!==_getLogin()?'<span style="font-size:10px;color:var(--accent);margin-left:8px">par '+_esc(n.auteur)+'</span>':'';
    return '<div class="note-item">'
      +'<div class="note-item-header">'
      +'<span class="note-item-date">'+date+'</span>'
      +auteur
      +'<button class="note-item-del" onclick="deleteNote(this)" data-id="'+n._id+'">&#10005;</button>'
      +'</div>'
      +'<div class="note-item-text">'+_esc(n.text||'')+'</div>'
      +'</div>';
  }).join('');
}

function _esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function saveNote(){
  var myLogin=_getLogin();
  if(!myLogin){showToast('\u26a0 Non connect\u00e9');return;}
  var target=_currentTarget||myLogin;
  var ta=document.getElementById('note-text-input');
  var text=(ta?ta.value:'').trim();
  if(!text){showToast('\u26a0 \u00c9crivez une note');return;}
  var btn=document.getElementById('note-send-btn');
  if(btn){btn.disabled=true;btn.textContent='Envoi...';}
  _initFB().then(function(db){
    return db.collection('notes').doc(target).collection('items').add({
      text:text,
      auteur:myLogin,
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
  }).then(function(){
    if(ta) ta.value='';
    var cc=document.getElementById('note-char-count');
    if(cc) cc.textContent='0 / 2000';
    if(btn){btn.disabled=false;btn.innerHTML='&#128203;&nbsp;Enregistrer';}
    var sel=document.getElementById('note-target-select');
    var nom=sel&&sel.value&&sel.selectedIndex>=0?sel.options[sel.selectedIndex].text:'';
    showToast('\u2705 Note enregistr\u00e9e'+(nom?' pour '+nom:''));
  }).catch(function(e){
    console.error('saveNote error:',e);
    if(btn){btn.disabled=false;btn.innerHTML='&#128203;&nbsp;Enregistrer';}
    showToast('\u26a0 Erreur : '+e.message);
  });
}

function deleteNote(btnEl){
  var noteId=btnEl.getAttribute('data-id');
  var myLogin=_getLogin();
  if(!myLogin||!noteId) return;
  if(!confirm('Supprimer cette note ?')) return;
  var target=_currentTarget||myLogin;
  _initFB().then(function(db){
    return db.collection('notes').doc(target).collection('items').doc(noteId).delete();
  }).then(function(){showToast('Note supprim\u00e9e');})
  .catch(function(e){showToast('\u26a0 '+e.message);});
}

// ── Init ─────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',function(){
  var login=_getLogin();
  if(!login){window.location.href='index.html';return;}
  var role=_getRole();

  // Bouton retour
  var bb=document.getElementById('back-btn');
  if(bb) bb.href=_getReturnPage();

  // Badge utilisateur
  var badge=document.getElementById('user-badge');
  if(badge) badge.textContent=_getNom()||login;

  // Compteur caractères
  var ta=document.getElementById('note-text-input');
  if(ta){
    ta.addEventListener('input',function(){
      var len=ta.value.length;
      var cc=document.getElementById('note-char-count');
      if(cc) cc.textContent=len+' / 2000';
      if(len>2000) ta.value=ta.value.substring(0,2000);
    });
  }

  // Cible par défaut
  _currentTarget=login;
  _notesListen(login);

  // Commercial / admin → charger sélecteur clients
  if(role==='user'||role==='admin'){
    _loadClients(login,role);
  }

  // Changement de sélecteur
  var sel=document.getElementById('note-target-select');
  if(sel){
    sel.addEventListener('change',function(){
      _currentTarget=sel.value||login;
      _updateSubtitle(sel);
      _notesListen(_currentTarget);
    });
  }
});

</script>
</body>
</html>
