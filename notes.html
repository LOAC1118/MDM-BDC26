  var t=document.getElementById('_toast');

}

function sha256(str){
  if(window.crypto&&window.crypto.subtle){
    return window.crypto.subtle.digest('SHA-256',new TextEncoder().encode(str))
      .then(function(buf){return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');});
  }
  return Promise.resolve(_sha256Pure(str));
}
function _sha256Pure(s){

  var H=[0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
  function rr(x,n){return(x>>>n)|(x<<(32-n));}
  var b=[],i,j;
  for(i=0;i<s.length;i++){var c=s.charCodeAt(i);if(c<128)b.push(c);else if(c<2048)b.push((c>>6)|192,(c&63)|128);else b.push((c>>12)|224,((c>>6)&63)|128,(c&63)|128);}
  var len=b.length;b.push(128);while(b.length%64!==56)b.push(0);
  var bits=len*8;b.push(0,0,0,0,(bits>>>24)&255,(bits>>>16)&255,(bits>>>8)&255,bits&255);
  for(i=0;i<b.length;i+=64){
    var w=[];for(j=0;j<16;j++)w.push((b[i+j*4]<<24)|(b[i+j*4+1]<<16)|(b[i+j*4+2]<<8)|b[i+j*4+3]);
    for(j=16;j<64;j++){var s0=rr(w[j-15],7)^rr(w[j-15],18)^(w[j-15]>>>3);var s1=rr(w[j-2],17)^rr(w[j-2],19)^(w[j-2]>>>10);w.push((w[j-16]+s0+w[j-7]+s1)>>>0);}
    var aa=H[0],bb=H[1],cc=H[2],dd=H[3],ee=H[4],ff=H[5],gg=H[6],hh=H[7];
    for(j=0;j<64;j++){var S1=rr(ee,6)^rr(ee,11)^rr(ee,25);var ch=(ee&ff)^(~ee&gg);var t1=(hh+S1+ch+K[j]+w[j])>>>0;var S0=rr(aa,2)^rr(aa,13)^rr(aa,22);var maj=(aa&bb)^(aa&cc)^(bb&cc);var t2=(S0+maj)>>>0;hh=gg;gg=ff;ff=ee;ee=(dd+t1)>>>0;dd=cc;cc=bb;bb=aa;aa=(t1+t2)>>>0;}
    H[0]=(H[0]+aa)>>>0;H[1]=(H[1]+bb)>>>0;H[2]=(H[2]+cc)>>>0;H[3]=(H[3]+dd)>>>0;H[4]=(H[4]+ee)>>>0;H[5]=(H[5]+ff)>>>0;H[6]=(H[6]+gg)>>>0;H[7]=(H[7]+hh)>>>0;
  }
  return H.map(n).join('');
}
function _safeB64Encode(str){
  try{return btoa(unescape(encodeURIComponent(str)));}
  catch(e){return btoa(encodeURIComponent(str));}
}
function _safeB64Decode(str){
  try{return decodeURIComponent(escape(atob(str)));}
  catch(e){try{return decodeURIComponent(atob(str));}catch(e2){return atob(str);}}
}

function _getReturnPage(){var r=document.referrer;if(r&&r.indexOf('commande.html')>=0)return 'commande.html';if(r&&r.indexOf('admin.html')>=0)return 'admin.html';return 'dashboard.html';}

  if(!login){window.location.href='index.html';return;}
  var bb=document.getElementById('back-btn');
  if(bb) bb.href=_getReturnPage();

  }catch(e){}

  // Si commercial → charger ses clients et afficher le sélecteur
  if(role==='user'||role==='admin'){
    _loadClientsForSelector(login,role);
  }

  // Quand le sélecteur change → recharger les notes du compte cible

  if(sel){
    sel.addEventListener('change',function(){
      var target=sel.value||login;
      var badge=document.getElementById('note-target-badge');

      _notesListen(target);
    });

  // Présélectionner le client si paramètre ?client= dans l'URL
  var urlParams=new URLSearchParams(window.location.search);
  var clientParam=urlParams.get('client');
  if(clientParam){
    // Attendre que le sélecteur soit rempli (après _loadClientsForSelector)
    var _preselectTimer=setInterval(function(){
      var selEl=document.getElementById('note-target-select');
      if(!selEl) return;
      // Chercher l'option correspondante
      var found=false;
      for(var i=0;i<selEl.options.length;i++){
        if(selEl.options[i].value===clientParam){
          selEl.value=clientParam;
          found=true;
          break;
        }
      }
      if(found||selEl.options.length>1){
        clearInterval(_preselectTimer);
        if(found){
          // Déclencher le changement
          selEl.dispatchEvent(new Event('change'));
          // Mettre à jour le badge
          var badge=document.getElementById('note-target-badge');

// Charger les clients du commercial dans le sélecteur
function _loadClientsForSelector(login,role){
  var wrap=document.getElementById('client-selector-wrap');
  if(wrap) wrap.style.display='block';
  var sel=document.getElementById('note-target-select');
  if(!sel) return;
  // Charger depuis localStorage (déjà synchronisé par dashboard)
  var allComptes=[];
  try{allComptes=JSON.parse(localStorage.getItem('mdm_comptes')||'[]');}catch(e){}
  var clients=[];
  if(role==='admin'){
    // Admin voit tous les comptes
    clients=allComptes.filter(function(c){return c.role==='client'||c.role==='user';});
  } else {
    // Commercial voit seulement ses clients assignés
    clients=allComptes.filter(function(c){return c.role==='client'&&c.commercial===login;});
  }
  if(!clients.length){
    // Essayer Firebase
    initFirebase().then(function(db){
      return db.collection('comptes').get();
    }).then(function(snap){
      var all=snap.docs.map(function(d){return d.data();});
      var list=role==='admin'?all.filter(function(c){return c.role==='client'||c.role==='user';}):all.filter(function(c){return c.role==='client'&&c.commercial===login;});
      _populateClientSelect(sel,list);
    }).catch(function(){});
    return;
  }
  _populateClientSelect(sel,clients);
}

function _populateClientSelect(sel,clients){
  // Garder l'option "mes notes"
  sel.innerHTML='<option value="">&#128100; Mes propres notes</option>';
  clients.sort(function(a,b){return (a.nom||a.login).localeCompare(b.nom||b.login);});
  clients.forEach(function(c){
    var opt=document.createElement('option');
    opt.value=c.login;
    opt.textContent=(c.nom||c.login)+(c.ville?' — '+c.ville:'');
    sel.appendChild(opt);
  });
}
function _notesListen(login){
  if(_notesUnsub){_notesUnsub();_notesUnsub=null;}
  initFirebase().then(function(db){
    _notesUnsub=db.collection('notes').doc(login).collection('items')
      .orderBy('createdAt','desc').limit(100)
      .onSnapshot(function(snap){
        _renderNotes(snap.docs.map(function(doc){return Object.assign({_id:doc.id},doc.data());}));
      },function(){
        document.getElementById('notes-list').innerHTML='<div class="notes-empty">Erreur.</div>';
      });
  });
}
function _renderNotes(notes){
  var list=document.getElementById('notes-list');
  if(!list) return;
  if(!notes.length){list.innerHTML='<div class="notes-empty">Aucune note encore.</div>';return;}
  list.innerHTML=notes.map(function(n){
    var date='';
    if(n.createdAt&&n.createdAt.toDate)
      date=n.createdAt.toDate().toLocaleString('fr-FR',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
    var id=n._id.replace(/'/g,"\\'");
    return '<div class="note-item"><div class="note-item-header"><span class="note-item-date">'+date+'</span>'
      +'<button class="note-item-del" onclick="deleteNote(\''+id+'\')">×</button></div>'
      +'<div class="note-item-text">'+_esc(n.text||'')+'</div></div>';
  }).join('');
}
function _esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function saveNote(){
  var login=_getLogin();
  if(!login){showToast('Non connecte');return;}
  var ta=document.getElementById('note-text-input');
  var text=(ta?ta.value:'').trim();
  if(!text){showToast('Ecrivez une note');return;}
  var btn=document.getElementById('note-send-btn');
  if(btn) btn.disabled=true;
  initFirebase().then(function(db){
    return db.collection('notes').doc(login).collection('items').add({
      text:text,createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
  }).then(function(){
    if(ta) ta.value='';
    var cc=document.getElementById('note-char-count');if(cc) cc.textContent='0 / 2000';
    if(btn) btn.disabled=false;
    showToast('Note enregistree');
  }).catch(function(e){if(btn)btn.disabled=false;showToast('Erreur : '+e.message);});
}
function deleteNote(noteId){
  var login=_getLogin();
  if(!login||!confirm('Supprimer cette note ?')) return;
  initFirebase().then(function(db){
    return db.collection('notes').doc(login).collection('items').doc(noteId).delete();
  }).then(function(){showToast('Note supprimee');})
  .catch(function(e){showToast('Erreur : '+e.message);});
}
